# =============================================================================
# Telegraf Configuration for Agricultural Facility Monitoring System
# =============================================================================
# Purpose: Bridge MQTT (sensor data) to InfluxDB v2
#
# Data Flow:
#   Pico Nodes → Mosquitto (MQTT) → Telegraf → InfluxDB → Grafana
#
# MQTT Topic Pattern:
#   greenhouse/{house_id}/sensor/{sensor_type}
#   Examples: greenhouse/h1/sensor/temperature, greenhouse/h1/sensor/humidity
#
# Payload Format (JSON):
#   {
#     "value": 25.0,
#     "sensor_type": "temperature",
#     "source": "pico_node_01",
#     "house_id": "h1",
#     "location": "indoor",
#     "unit": "℃",
#     "timestamp": "2026-02-07T12:00:00Z"
#   }
#
# InfluxDB Structure:
#   - Organization: agri-ha
#   - Bucket: sensor_data
#   - Measurement: greenhouse_data
#   - Tags: source, sensor_type, house_id, location, topic
#   - Field: value
# =============================================================================

# -----------------------------------------------------------------------------
# Agent Configuration
# -----------------------------------------------------------------------------
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# -----------------------------------------------------------------------------
# MQTT Consumer Input Plugin
# -----------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  ## MQTT Broker
  servers = ["tcp://localhost:1883"]

  ## Topics to subscribe
  topics = [
    "greenhouse/#"
  ]

  ## QoS level (0, 1, 2)
  qos = 0

  ## Connection timeout
  connection_timeout = "30s"

  ## Max undelivered messages
  max_undelivered_messages = 1000

  ## Persistent session
  persistent_session = false

  ## Client ID (leave empty for random)
  client_id = ""

  ## Username and password (if authentication enabled)
  # username = "telegraf"
  # password = "secret"

  ## Data format
  data_format = "json"

  ## JSON string fields (prevent automatic number conversion)
  json_string_fields = ["sensor_type", "source", "house_id", "location", "unit"]

  ## Tag keys (convert these JSON fields to InfluxDB tags)
  tag_keys = ["source", "sensor_type", "house_id", "location"]

  ## Add topic as tag
  topic_tag = "topic"

  ## Name key (leave empty to use measurement name from topic_parsing)
  json_name_key = ""

  ## Override measurement name
  name_override = "greenhouse_data"

  ## Topic parsing (extract measurement name from topic)
  ## Pattern: greenhouse/{house_id}/sensor/{sensor_type}
  ## Result: measurement name = "greenhouse_data" (from name_override)
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "greenhouse/+/sensor/+"
    measurement = ""
    tags = ""

# -----------------------------------------------------------------------------
# MQTT Consumer Input Plugin - Irrigation Events
# -----------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  ## MQTT Broker
  servers = ["tcp://localhost:1883"]

  ## Topics to subscribe
  topics = [
    "greenhouse/+/irrigation/event"
  ]

  ## QoS level (0, 1, 2)
  qos = 0

  ## Connection timeout
  connection_timeout = "30s"

  ## Max undelivered messages
  max_undelivered_messages = 1000

  ## Persistent session
  persistent_session = false

  ## Client ID
  client_id = "telegraf_irrigation"

  ## Username and password (if authentication enabled)
  # username = "telegraf"
  # password = "secret"

  ## Data format
  data_format = "json"

  ## JSON string fields (prevent automatic number conversion)
  json_string_fields = ["source", "status", "house_id"]

  ## Tag keys (convert these JSON fields to InfluxDB tags)
  tag_keys = ["house_id", "source", "status"]

  ## Add topic as tag
  topic_tag = "topic"

  ## Override measurement name
  name_override = "irrigation_events"

  ## Topic parsing — extract house_id from topic path
  ## greenhouse/{house_id}/irrigation/event
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "greenhouse/+/irrigation/event"
    measurement = ""
    tags = ""

# -----------------------------------------------------------------------------
# InfluxDB v2 Output Plugin
# -----------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  ## InfluxDB URL
  urls = ["http://localhost:8086"]

  ## Token (use environment variable INFLUX_TOKEN for security)
  token = "$INFLUX_TOKEN"

  ## Organization
  organization = "agri-ha"

  ## Bucket
  bucket = "sensor_data"

  ## Timeout
  timeout = "5s"

  ## HTTP User-Agent
  user_agent = "telegraf"

  ## Optional TLS Config
  # tls_ca = "/etc/telegraf/ca.pem"
  # tls_cert = "/etc/telegraf/cert.pem"
  # tls_key = "/etc/telegraf/key.pem"
  # insecure_skip_verify = false

