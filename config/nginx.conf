server {
    listen 80;
    server_name _;

    # UI (agriha-chat)
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # unipi-daemon REST API
    location /api/sensors {
        proxy_pass http://127.0.0.1:8080;
    }
    location /api/relay {
        proxy_pass http://127.0.0.1:8080;
    }

    # カメラ画像（静的ファイル）
    location /picture/ {
        alias /var/lib/agriha/pictures/;
        autoindex on;
    }
}
