# Layer 3: LLM 1時間予報設定
# 設計書: docs/v2_three_layer_design.md §6.3
llm:
  provider: "ollama"
  model: "qwen3:8b"
  base_url: "http://localhost:11434/v1/"  # RPi ローカル Ollama
  api_key_env: "OLLAMA_API_KEY"           # Ollama はキー不要（ダミー）
  max_tokens: 1024
  max_tool_rounds: 5
  api_timeout_sec: 30.0

system_prompt_path: "/etc/agriha/system_prompt.txt"

db:
  path: "/var/lib/agriha/control_log.db"
  history_count: 3              # プロンプトに含める直近判断件数

state:
  plan_path: "/var/lib/agriha/current_plan.json"
  last_decision_path: "/var/lib/agriha/last_decision.json"

unipi_api:
  base_url: "http://localhost:8080"
  api_key: ""
  timeout_sec: 10

location:
  latitude: 42.888
  longitude: 141.603
  elevation: 21
