# /etc/nginx/sites-available/toiso.fit
# VPS nginx設定 — LINE Bot webhook + QR画像配信
#
# デプロイ:
#   sudo cp config/nginx-vps-toiso.conf /etc/nginx/sites-available/toiso.fit
#   sudo ln -sf /etc/nginx/sites-available/toiso.fit /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name toiso.fit;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name toiso.fit;

    # Let's Encrypt 証明書（certbot管理）
    ssl_certificate     /etc/letsencrypt/live/toiso.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toiso.fit/privkey.pem;

    # SSL設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- LINE Bot webhook ---
    location /callback {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /callback/test {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 内部API（register_pubkey, cleanup_qr等）---
    location /api/ {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- QR画像配信（静的ファイル）---
    location /qr/ {
        alias /var/www/qr/;
        expires 24h;
        add_header Cache-Control "public, no-transform";
    }

    # --- ヘルスチェック ---
    location /health {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
    }

    # certbot チャレンジ
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
