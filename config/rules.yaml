# Layer 2: ルールベース制御設定
temperature:
  target_day: 26.0             # 日中目標温度 (℃)
  target_night: 17.0           # 夜間目標温度 (℃) ※LOW_TEMP_THRESHOLD(16℃)+1℃以上を推奨
  margin_open: 2.0             # 目標+Nで窓開 (℃)
  margin_close: 1.0            # 目標-Nで窓閉 (℃)
  attention_temp: 30.0         # 注意ライン (℃) P90相当: 全窓70-100%開放
  emergency_temp: 32.0         # 緊急ライン (℃) P95相当: 全窓全開
  early_morning_offset: -1.0   # 早朝5-8h換気先行オフセット (℃): 通常閾値より1℃早く換気開始
  # window_channels は channel_map.yaml の side_window.groups に集約（open/close分離）

wind:
  strong_wind_threshold_ms: 5.0  # 強風閾値 (m/s)
  # 風向別の窓閉判定は channel_map.yaml の side_window.groups[].wind_close_directions に集約

rain:
  threshold_mm_h: 0.5           # 降雨閾値 (mm/h)
  resume_delay_min: 30          # 降雨停止後の再開猶予 (分)

irrigation:
  channel: 4                    # 灌水電磁弁チャンネル
  crop_config_path: "/etc/agriha/crop_irrigation.yaml"

unipi_api:
  base_url: "http://localhost:8080"
  api_key: ""
  timeout_sec: 10

location:
  latitude: 42.888
  longitude: 141.603
  elevation: 21

pitagorasu:
  enabled: true                   # false=従来のバイナリ開閉にフォールバック
  open_travel_sec: 65             # 全閉→全開 走行時間（巻き上げ、重力に逆らう）
  close_travel_sec: 50            # 全開→全閉 走行時間（巻き下ろし、重力アシスト）
  deadband: 0.05                  # 不感帯（5%未満の差分は無視）
  stages:                         # max_temp昇順。effective_temp < max_temp で判定
    - {max_temp: 25.0, south: 0.0, north: 0.0, name: closed}
    - {max_temp: 27.0, south: 0.3, north: 0.0, name: south_micro}
    - {max_temp: 30.0, south: 0.5, north: 0.5, name: both_medium}
    - {max_temp: 32.0, south: 0.8, north: 0.8, name: both_wide}
    - {max_temp: 999,  south: 1.0, north: 1.0, name: full_open}
  predictive:
    mild_trend_threshold: 1.5     # ℃/h 以上で先読み補正
    rapid_trend_threshold: 3.0    # ℃/h 以上で大幅先読み
    mild_bonus: 1.0               # mild時の実効温度加算 (℃)
    rapid_bonus: 2.0              # rapid時の実効温度加算 (℃)

custom_rules: []
