# VPS LINE Bot デプロイ設定
# deploy_vps_linebot.sh が読み込む。環境に合わせて編集すること。
#
# Usage:
#   1. このファイルをコピーして編集
#   2. sudo bash scripts/deploy_vps_linebot.sh --setup

# ドメイン名（nginx SSL + QR画像URL）
DOMAIN="toiso.fit"

# LINE Bot uvicorn ポート（nginx → uvicorn）
APP_PORT="8443"

# デプロイ先シンボリックリンク（systemd WorkingDirectory）
DEPLOY_DIR="/opt/agriha-linebot"

# QR画像配信ディレクトリ（nginx /qr/ → ここ）
QR_DIR="/var/www/qr"

# WireGuard 農家VPN設定
WG_INTERFACE="wg-farmers"
WG_PORT="51821"
WG_SERVER_IP="10.20.0.1/24"

# SSL証明書パス（Let's Encrypt）
SSL_CERT="/etc/letsencrypt/live/${DOMAIN}/fullchain.pem"
SSL_KEY="/etc/letsencrypt/live/${DOMAIN}/privkey.pem"
