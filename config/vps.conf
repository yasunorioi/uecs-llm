# VPS LINE Bot deploy settings
# Loaded by deploy_vps_linebot.sh. Edit to match your environment.
#
# Usage:
#   1. Edit this file
#   2. sudo bash scripts/deploy_vps_linebot.sh --setup

# Domain name (nginx SSL + QR image URL)
DOMAIN="toiso.fit"

# LINE Bot uvicorn port (nginx -> uvicorn)
APP_PORT="8443"

# Deploy symlink target (systemd WorkingDirectory)
DEPLOY_DIR="/opt/agriha-linebot"

# QR image serving directory (nginx /qr/ -> here)
QR_DIR="/var/www/qr"

# WireGuard farmer VPN settings
WG_INTERFACE="wg-farmers"
WG_PORT="51821"
WG_SERVER_IP="10.20.0.1/24"

# SSL certificate paths (Let's Encrypt)
SSL_CERT="/etc/letsencrypt/live/${DOMAIN}/fullchain.pem"
SSL_KEY="/etc/letsencrypt/live/${DOMAIN}/privkey.pem"
